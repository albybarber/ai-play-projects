<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Overlay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="titlebar-drag">
    <span class="app-title">Video Overlay</span>
  </div>

  <div id="plugin-banner" class="plugin-banner warn">Checking virtual camera status…</div>

  <div class="app-layout">

    <!-- Left: live preview -->
    <div class="preview-area">
      <video id="camera-feed" autoplay playsinline muted style="display:none"></video>
      <canvas id="preview-canvas"></canvas>
      <p class="preview-label">Share this view as "Video Overlay Camera" in Zoom / Teams / Meet</p>
    </div>

    <!-- Right: config -->
    <div class="config-panel">

      <!-- Timer -->
      <div class="panel-section">
        <div class="section-title">⏱ Timer</div>
        <div class="timer-display" id="timer-display">05:00</div>
        <div class="timer-state idle" id="timer-state">IDLE</div>

        <div class="duration-row">
          <input type="text" id="timer-duration" value="05:00" placeholder="MM:SS" />
        </div>

        <div class="timer-controls">
          <button class="btn-start" id="btn-start">▶ Start</button>
          <button class="btn-pause" id="btn-pause" disabled>⏸ Pause</button>
          <button class="btn-reset" id="btn-reset">↺ Reset</button>
        </div>

        <div class="on-expire-opts">
          <div class="opt-label">On expire</div>
          <label class="checkbox-row">
            <input type="checkbox" id="chk-siren" checked />
            Flash siren 🚨
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="chk-show-timer" checked />
            Show timer on feed
          </label>
        </div>
      </div>

      <!-- Overlays -->
      <div class="panel-section">
        <div class="section-title">🎨 Overlays</div>
        <div class="overlay-list" id="overlay-list"></div>
        <button class="btn-add" id="btn-add-overlay">+ Add image / video</button>
      </div>

      <!-- Camera -->
      <div class="panel-section">
        <div class="section-title">📷 Camera</div>
        <select class="camera-select" id="camera-select"></select>
      </div>

    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
