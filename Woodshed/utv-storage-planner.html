<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SxS Shelter Planner — Can-Am Defender MAX HD11</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;600&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0b1824;
    --panel: #0f2033;
    --surface: #132540;
    --border: #1a3550;
    --line: #254d6e;
    --cyan: #5eb8d4;
    --cyan-hi: #90d4ed;
    --cyan-dim: rgba(94,184,212,0.2);
    --amber: #ffc947;
    --amber-dim: rgba(255,201,71,0.12);
    --white: #ddf0fa;
    --muted: #7aabcc;
    --dim: #3d6e8a;
    --moss: #3dba7e;
    --rust: #e05252;
    --rust-dim: rgba(224,82,82,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(circle, rgba(94,184,212,0.1) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  /* ─── HEADER ────────────────────────────────────────────────────────────── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    align-items: stretch;
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--amber), rgba(255,201,71,0.2), transparent);
  }

  .header-main {
    padding: 14px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.85rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: 1px;
    line-height: 1;
    text-transform: uppercase;
  }
  .header-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ─── MAIN ──────────────────────────────────────────────────────────────── */
  .main {
    display: block;
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 28px 64px;
  }

  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    position: relative;
  }
  .canvas-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent 60%);
  }

  canvas { display: block; width: 100%; }

  /* ─── MATERIALS ─────────────────────────────────────────────────────────── */
  .materials {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    position: relative;
  }
  .materials::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--moss), transparent 60%);
  }
  .mat-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mat-title::before { content: '▸'; color: var(--moss); font-size: 0.45rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    text-align: left;
    padding: 5px 9px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 6px 9px;
    border-bottom: 1px solid rgba(26,53,80,0.5);
    color: var(--white);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  td.mono { font-family: 'JetBrains Mono', monospace; color: var(--cyan); font-size: 0.73rem; }
  td.note { font-size: 0.68rem; color: var(--dim); }
  td.cost { font-family: 'JetBrains Mono', monospace; color: var(--moss); }
  .cat-row td {
    background: rgba(94,184,212,0.04);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
    padding: 4px 9px;
    border-bottom: 1px solid rgba(94,184,212,0.08);
  }
  .total-row td {
    border-top: 1px solid var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    padding-top: 11px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .total-row .cost { font-size: 1rem; color: var(--moss); }

  /* ─── NOTES GRID ────────────────────────────────────────────────────────── */
  .notes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--cyan);
    padding: 12px 14px;
  }
  .note-card h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.57rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 8px;
  }
  .note-card ul { list-style: none; padding: 0; }
  .note-card ul li {
    font-size: 0.73rem;
    color: var(--muted);
    line-height: 1.6;
    padding-left: 14px;
    position: relative;
  }
  .note-card ul li:before { content: '—'; position: absolute; left: 0; color: var(--dim); }
  .note-card.green { border-left-color: var(--moss); }
  .note-card.green h4 { color: var(--moss); }
  .note-card.red { border-left-color: var(--rust); }
  .note-card.red h4 { color: #f09090; }

  @media (max-width: 900px) {
    .notes-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-main">
    <div class="header-tag">PROJECT // 2026-05-19</div>
    <h1>SxS Shelter Planner</h1>
    <div class="header-sub">Single-bay equipment shelter — Can-Am Defender MAX HD11</div>
  </div>
</header>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="cv" height="420"></canvas>
  </div>

  <div class="materials">
    <div class="mat-title">Materials List</div>
    <table id="mat-table">
      <thead>
        <tr>
          <th>Item</th><th>Qty</th><th>Notes</th>
        </tr>
      </thead>
      <tbody id="mat-body"></tbody>
    </table>
  </div>

  <div class="notes-grid" id="notes-grid">
    <!-- Build notes — populated in Task 4 -->
  </div>
</div>

<script>
const SHELTER = {
  // Vehicle: 2026 Can-Am Defender MAX Limited HD11
  vehicle: {
    name: "Can-Am Defender MAX HD11",
    lengthIn: 162.4,
    widthIn: 65.0,
    heightIn: 81.4,
    wheelbaseIn: 117.5,
  },
  // Structure (all inches internally, ft used for display)
  bayWidthFt: 10,
  bayDepthFt: 16,
  frontWallHeightFt: 8,
  roofPitch: 3,          // 3/12
  eaveOverhangIn: 12,
  postSpacingFt: 8,      // mid-span post on each 16 ft side
  postCount: 6,          // 4 corners + 2 mid-span
  frostLineIn: 48,       // assumed Catskills NY
  rafterSpacingIn: 24,
  snowLoadPsf: 50,
};

// Derived:
//   rearWallHeightFt = 8 + (16 * 3/12) = 12 ft
//   rafterRunFt = bayWidthFt = 10 ft  (rafters span the 10 ft width)
//   roofLengthAlongSlopeFt = sqrt(10^2 + ((10*3/12))^2) ≈ 10.31 ft  (small extra for slope)

let view = 'front';

// Blueprint color palette
const C = {
  post: '#5eb8d4',
  beam: '#7acce3',
  roof: '#2d6a84',
  roofDark: '#1a3d4e',
  wall: '#1a4060',
  wallLight: '#2d6a84',
  open: 'rgba(94,184,212,0.05)',
  openBorder: 'rgba(94,184,212,0.35)',
  wood: '#7a6040',
  woodDark: '#4a3820',
  ground: '#060e17',
  gravel: '#101820',
  utv: '#2a9a60',
  splitter: '#5a8aaa',
  dim: '#ffc947',
  label: '#5eb8d4',
  grid: 'rgba(94,184,212,0.05)',
  bg: '#0a1525',
  sky: 'rgba(94,184,212,0.03)',
  divider: '#4a9ab8',
  straw: '#ffc947',
  grain: '#5eb8d4',
  cedar: '#4a9ab8',
};

// PRICES placeholder — will be replaced in Task 3
const PRICES = {
  post6x6: 45,
  concrete: 7,
  postBase: 15,
  helical: 55,
  gravel: 32,
  lvlPerFt: 8,
  postCap: 12,
  beamPerFt: 5.5,
  rafter26PerFt: 1.8,
  rafter28PerFt: 2.5,
  hurricaneTie: 2,
  metalPerSqft: 1.5,
  ridgePerFt: 3,
  closure: 20,
  roofScrew: 0.08,
  sidingPerSqft: 1.6,
  post4x4: 12,
  rail2x4PerFt: 0.55,
  screwBox: 28,
  joistHanger: 1.5,
  lagBox: 15,
  lumber2x12PerFt: 2.2,  // 2×12 #2 PT per linear foot
  tubeForm: 9,           // 10" dia sonotube/tube form ~4 ft length
};

// Blueprint dot grid in canvas
function drawCanvasBg() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, cv.width, cv.height);
  // Fine dot grid
  ctx.fillStyle = 'rgba(94,184,212,0.12)';
  for (let x = 0; x < cv.width; x += 20) {
    for (let y = 0; y < cv.height; y += 20) {
      ctx.fillRect(x, y, 1, 1);
    }
  }
}

// Crosshatch fill for walls/solid elements
function drawHatch(x, y, w, h, color, spacing) {
  spacing = spacing || 6;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.5;
  for (let i = -h; i < w + h; i += spacing) {
    ctx.beginPath();
    ctx.moveTo(x + i, y);
    ctx.lineTo(x + i + h, y + h);
    ctx.stroke();
  }
  ctx.restore();
}

function draw() {
  // Canvas drawings re-implemented in Task 2
}

function drawFront(p) {
  const cw = cv.width, ch = cv.height;
  const W = eW(p);
  const margin = 60;
  const scale = (cw - margin*2) / W;
  const maxH = rearH(p);
  const scaleH = (ch - margin*2 - 40) / maxH;
  const S = Math.min(scale, scaleH);

  const ox = margin + (cw - margin*2 - W*S)/2;
  const oy = ch - margin - 20;

  // Ground — hatched earth
  ctx.fillStyle = C.ground;
  ctx.fillRect(ox - 10, oy, W*S + 20, 20);
  drawHatch(ox - 10, oy, W*S + 20, 20, 'rgba(94,184,212,0.15)', 5);

  if (p.gravel && p.woodBay) {
    ctx.fillStyle = C.gravel;
    ctx.fillRect(ox, oy, W*S, 10);
    ctx.fillStyle = 'rgba(94,184,212,0.08)';
    for (let i = 0; i < 60; i++) {
      const gx = ox + Math.random() * W*S;
      const gy = oy + Math.random() * 10;
      ctx.fillRect(gx, gy, 2, 1);
    }
  }

  const uW = p.utvW * S;
  const sW = p.splW * S;
  const wW = woodBayW(p) * S;
  const fHs = p.fH * S;

  ctx.fillStyle = C.sky;
  ctx.fillRect(ox, oy - fHs - 20, W*S, fHs + 20);

  // UTV Bay
  const ux = ox;
  if (p.sideWalls) {
    ctx.fillStyle = 'rgba(26,64,96,0.8)';
    ctx.fillRect(ux, oy - fHs, 8, fHs);
    drawHatch(ux, oy - fHs, 8, fHs, 'rgba(94,184,212,0.25)', 5);
    ctx.strokeStyle = C.post; ctx.lineWidth = 1;
    ctx.strokeRect(ux, oy - fHs, 8, fHs);
  }
  ctx.fillStyle = C.open;
  ctx.fillRect(ux + 8, oy - fHs + 8, uW - 16, fHs - 8);
  ctx.strokeStyle = C.openBorder;
  ctx.lineWidth = 0.8;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(ux + 8, oy - fHs + 8, uW - 16, fHs - 8);
  ctx.setLineDash([]);
  drawUTV(ctx, ux + uW/2, oy, uW * 0.75, S);
  labelText('UTV BAY', ux + uW/2, oy - fHs + 20, C.label, '0.6rem');
  labelText(`${p.utvW} ft`, ux + uW/2, oy - fHs + 34, C.dim, '0.58rem');

  // Splitter Bay
  const sx = ox + uW;
  if (p.sideWalls) {
    ctx.fillStyle = 'rgba(26,64,96,0.8)';
    ctx.fillRect(sx, oy - fHs, 8, fHs);
    drawHatch(sx, oy - fHs, 8, fHs, 'rgba(94,184,212,0.25)', 5);
    ctx.strokeStyle = C.post; ctx.lineWidth = 1;
    ctx.strokeRect(sx, oy - fHs, 8, fHs);
    if (!p.woodBay) {
      ctx.fillStyle = 'rgba(26,64,96,0.8)';
      ctx.fillRect(sx + sW - 8, oy - fHs, 8, fHs);
      drawHatch(sx + sW - 8, oy - fHs, 8, fHs, 'rgba(94,184,212,0.25)', 5);
      ctx.strokeStyle = C.post; ctx.lineWidth = 1;
      ctx.strokeRect(sx + sW - 8, oy - fHs, 8, fHs);
    }
  }
  ctx.fillStyle = C.open;
  ctx.fillRect(sx + 8, oy - fHs + 8, sW - 16, fHs - 8);
  ctx.strokeStyle = C.openBorder;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(sx + 8, oy - fHs + 8, sW - 16, fHs - 8);
  ctx.setLineDash([]);
  drawSplitter(ctx, sx + sW/2, oy, sW * 0.5, S);
  labelText('SPLITTER BAY', sx + sW/2, oy - fHs + 20, C.label, '0.6rem');
  labelText(`${p.splW} ft`, sx + sW/2, oy - fHs + 34, C.dim, '0.58rem');

  // Wood Bay
  if (p.woodBay && wW > 0) {
    const wx = ox + uW + sW;
    drawWoodStack(ctx, wx, oy, wW, fHs, S);
    if (p.divWall) {
      ctx.fillStyle = 'rgba(26,64,96,0.8)';
      ctx.fillRect(wx, oy - fHs, 6, fHs);
      drawHatch(wx, oy - fHs, 6, fHs, 'rgba(94,184,212,0.3)', 4);
      ctx.strokeStyle = C.divider; ctx.lineWidth = 1;
      ctx.strokeRect(wx, oy - fHs, 6, fHs);
    }
    if (p.sideWalls) {
      ctx.fillStyle = 'rgba(26,64,96,0.8)';
      ctx.fillRect(wx + wW - 8, oy - fHs, 8, fHs);
      drawHatch(wx + wW - 8, oy - fHs, 8, fHs, 'rgba(94,184,212,0.25)', 5);
      ctx.strokeStyle = C.post; ctx.lineWidth = 1;
      ctx.strokeRect(wx + wW - 8, oy - fHs, 8, fHs);
    }
    labelText('WOOD BAY', wx + wW/2, oy - fHs + 20, C.label, '0.6rem');
    labelText(`${woodBayW(p)} ft`, wx + wW/2, oy - fHs + 34, C.dim, '0.58rem');
  }

  // Roof
  const rearExtra = (p.pitch / 12) * p.D * S;
  ctx.beginPath();
  ctx.moveTo(ox - 12, oy - fHs);
  ctx.lineTo(ox + W*S + 12, oy - fHs);
  ctx.lineTo(ox + W*S + 12, oy - fHs - rearExtra);
  ctx.lineTo(ox - 12, oy - fHs - rearExtra);
  ctx.closePath();
  ctx.fillStyle = C.roofDark;
  ctx.fill();
  drawHatch(ox - 12, oy - fHs - rearExtra, W*S + 24, rearExtra + 2, 'rgba(94,184,212,0.1)', 8);
  ctx.fillStyle = C.roof;
  ctx.fillRect(ox - 14, oy - fHs - 10, W*S + 28, 12);
  ctx.strokeStyle = 'rgba(94,184,212,0.2)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    const rx = ox - 12 + (W*S + 24) * i/8;
    ctx.beginPath();
    ctx.moveTo(rx, oy - fHs - 10);
    ctx.lineTo(rx, oy - fHs - rearExtra);
    ctx.stroke();
  }
  ctx.strokeStyle = C.post; ctx.lineWidth = 1.5;
  ctx.strokeRect(ox - 14, oy - fHs - 10, W*S + 28, 10);

  // Posts
  const postXs = p.woodBay ? [ox, ox+uW+sW, ox+W*S] : [ox, ox+W*S];
  if (p.centerPost) postXs.splice(1, 0, ox+uW); // insert center post between UTV and splitter
  postXs.forEach(px => {
    ctx.fillStyle = 'rgba(94,184,212,0.2)';
    ctx.fillRect(px - 5, oy - fHs, 10, fHs);
    ctx.strokeStyle = C.post; ctx.lineWidth = 1.5;
    ctx.strokeRect(px - 5, oy - fHs, 10, fHs);
  });

  // Header beam(s)
  if (p.centerPost) {
    // Two separate built-up 3-ply 2×12 beams
    [[ox, uW, `3-PLY 2×12 (${p.utvW} ft)`], [ox+uW, sW, `3-PLY 2×12 (${p.splW} ft)`]].forEach(([bx, bw, lbl]) => {
      ctx.fillStyle = 'rgba(122,204,227,0.12)';
      ctx.fillRect(bx, oy - fHs - 2, bw, 14);
      ctx.strokeStyle = C.beam; ctx.lineWidth = 1.2;
      ctx.strokeRect(bx, oy - fHs - 2, bw, 14);
      labelText(lbl, bx + bw/2, oy - fHs - 12, C.straw, '0.48rem');
    });
  } else {
    // Single LVL spanning both bays
    ctx.fillStyle = 'rgba(122,204,227,0.15)';
    ctx.fillRect(ox, oy - fHs - 2, uW + sW, 14);
    ctx.strokeStyle = C.beam; ctx.lineWidth = 1.2;
    ctx.strokeRect(ox, oy - fHs - 2, uW + sW, 14);
    ctx.strokeStyle = 'rgba(255,201,71,0.4)'; ctx.lineWidth = 0.6; ctx.setLineDash([3,3]);
    ctx.strokeRect(ox+2, oy - fHs, uW + sW - 4, 10);
    ctx.setLineDash([]);
    labelText('LVL HEADER', ox + (uW+sW)/2, oy - fHs - 12, C.straw, '0.52rem');
  }

  drawDimH(ctx, ox - 32, oy, fHs, `${p.fH} ft`, C.dim);
  drawDimW(ctx, ox, oy + 30, W*S, `${W} ft`, C.dim);
  labelText('FRONT VIEW — OPEN FACE', cw/2, 14, 'rgba(94,184,212,0.5)', '0.52rem');
}

function drawTop(p) {
  const cw = cv.width, ch = cv.height;
  const W = eW(p);
  const margin = 60;
  const scaleW = (cw - margin*2) / W;
  const scaleD = (ch - margin*2 - 40) / p.D;
  const S = Math.min(scaleW, scaleD);

  const ox = margin + (cw - margin*2 - W*S)/2;
  const oy = margin + (ch - margin*2 - 40 - p.D*S)/2 + 20;

  const uW = p.utvW*S, sW = p.splW*S, wW = woodBayW(p)*S;
  const dS = p.D*S;

  ctx.fillStyle = p.gravel && p.woodBay ? C.gravel : '#0d1e2e';
  ctx.fillRect(ox, oy, W*S, dS);

  // UTV bay
  ctx.fillStyle = 'rgba(42,154,96,0.08)';
  ctx.fillRect(ox, oy, uW, dS);
  ctx.fillStyle = 'rgba(42,154,96,0.35)';
  const uvw = uW*0.8, uvd = dS*0.55;
  ctx.fillRect(ox + (uW-uvw)/2, oy + dS*0.1, uvw, uvd);
  ctx.strokeStyle = '#3dba7e'; ctx.lineWidth = 0.8;
  ctx.strokeRect(ox + (uW-uvw)/2, oy + dS*0.1, uvw, uvd);
  labelText('UTV', ox+uW/2, oy+dS*0.38, '#3dba7e', '0.65rem');

  // Splitter bay
  ctx.fillStyle = 'rgba(94,184,212,0.06)';
  ctx.fillRect(ox+uW, oy, sW, dS);
  ctx.fillStyle = 'rgba(94,184,212,0.25)';
  const spw = sW*0.5, spd = dS*0.35;
  ctx.fillRect(ox+uW+(sW-spw)/2, oy+dS*0.15, spw, spd);
  ctx.strokeStyle = C.cyan; ctx.lineWidth = 0.8;
  ctx.strokeRect(ox+uW+(sW-spw)/2, oy+dS*0.15, spw, spd);
  labelText('SPLITTER', ox+uW+sW/2, oy+dS*0.33, C.muted, '0.58rem');

  // Wood bay
  if (p.woodBay && wW > 0) {
    ctx.fillStyle = 'rgba(122,96,64,0.1)';
    ctx.fillRect(ox+uW+sW, oy, wW, dS);
    const rows = 3, rowH = dS*0.18;
    for (let r = 0; r < rows; r++) {
      ctx.fillStyle = r%2===0 ? 'rgba(122,96,64,0.45)' : 'rgba(74,56,32,0.45)';
      ctx.fillRect(ox+uW+sW + wW*0.08, oy + dS*0.08 + r*(rowH+4), wW*0.84, rowH);
      ctx.strokeStyle = 'rgba(122,96,64,0.3)'; ctx.lineWidth = 0.5;
      ctx.strokeRect(ox+uW+sW + wW*0.08, oy + dS*0.08 + r*(rowH+4), wW*0.84, rowH);
    }
    labelText('WOOD', ox+uW+sW+wW/2, oy+dS*0.75, C.cedar, '0.65rem');
  }

  // Walls — hatch fills
  const wt = 6;
  if (p.backWall) {
    ctx.fillStyle = 'rgba(26,64,96,0.8)';
    ctx.fillRect(ox, oy+dS-wt, W*S, wt);
    drawHatch(ox, oy+dS-wt, W*S, wt, 'rgba(94,184,212,0.3)', 4);
    ctx.strokeStyle = C.wall; ctx.lineWidth = 1;
    ctx.strokeRect(ox, oy+dS-wt, W*S, wt);
  }
  if (p.sideWalls) {
    ctx.fillStyle = 'rgba(26,64,96,0.8)';
    ctx.fillRect(ox, oy, wt, dS);
    drawHatch(ox, oy, wt, dS, 'rgba(94,184,212,0.3)', 4);
    ctx.strokeStyle = C.wall; ctx.lineWidth = 1;
    ctx.strokeRect(ox, oy, wt, dS);

    ctx.fillStyle = 'rgba(26,64,96,0.8)';
    ctx.fillRect(ox+W*S-wt, oy, wt, dS);
    drawHatch(ox+W*S-wt, oy, wt, dS, 'rgba(94,184,212,0.3)', 4);
    ctx.strokeStyle = C.wall; ctx.lineWidth = 1;
    ctx.strokeRect(ox+W*S-wt, oy, wt, dS);
  }
  if (p.woodBay && wW > 0) {
    ctx.fillStyle = 'rgba(94,184,212,0.2)';
    ctx.fillRect(ox+uW+sW-4, oy, 8, dS);
    ctx.strokeStyle = C.post; ctx.lineWidth = 1;
    ctx.strokeRect(ox+uW+sW-4, oy, 8, dS);
  }

  // Center post (top view)
  if (p.centerPost) {
    ctx.fillStyle = 'rgba(94,184,212,0.3)';
    ctx.fillRect(ox+uW-4, oy, 8, dS);
    ctx.strokeStyle = C.post; ctx.lineWidth = 1;
    ctx.strokeRect(ox+uW-4, oy, 8, dS);
  }

  // Header beam(s)
  if (p.centerPost) {
    [[ox, uW], [ox+uW, sW]].forEach(([bx, bw]) => {
      ctx.fillStyle = 'rgba(122,204,227,0.1)';
      ctx.fillRect(bx, oy, bw, 7);
      ctx.strokeStyle = C.beam; ctx.lineWidth = 1;
      ctx.strokeRect(bx, oy, bw, 7);
    });
    labelText('3-PLY 2×12', ox+(uW+sW)/2, oy-6, C.straw, '0.5rem');
  } else {
    ctx.fillStyle = 'rgba(122,204,227,0.1)';
    ctx.fillRect(ox, oy, uW+sW, 7);
    ctx.strokeStyle = C.beam; ctx.lineWidth = 1;
    ctx.strokeRect(ox, oy, uW+sW, 7);
    ctx.strokeStyle = 'rgba(255,201,71,0.4)'; ctx.lineWidth=0.5; ctx.setLineDash([4,3]);
    ctx.strokeRect(ox, oy, uW+sW, 7);
    ctx.setLineDash([]);
    labelText('LVL HEADER', ox+(uW+sW)/2, oy-6, C.straw, '0.5rem');
  }

  // Open front
  ctx.strokeStyle = 'rgba(94,184,212,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox+W*S, oy); ctx.stroke();
  ctx.setLineDash([]);
  labelText('← OPEN FRONT →', ox+W*S/2, oy-14, 'rgba(94,184,212,0.6)', '0.58rem');

  drawDimW(ctx, ox, oy+dS+30, W*S, `${W} ft`, C.dim);
  drawDimH(ctx, ox-32, oy, dS, `${p.D} ft`, C.dim);
  labelText('TOP VIEW — FLOOR PLAN', cw/2, 14, 'rgba(94,184,212,0.5)', '0.52rem');
}

function drawSide(p) {
  const cw = cv.width, ch = cv.height;
  const margin = 60;
  const rH = rearH(p);
  const scaleD = (cw - margin*2) / p.D;
  const scaleH = (ch - margin*2 - 40) / (rH + 2);
  const S = Math.min(scaleD, scaleH);

  const ox = margin + (cw - margin*2 - p.D*S)/2;
  const oy = ch - margin - 20;

  const fHs = p.fH*S;
  const rHs = rH*S;
  const dS = p.D*S;

  // Ground
  ctx.fillStyle = C.ground;
  ctx.fillRect(ox-10, oy, p.D*S+20, 20);
  drawHatch(ox-10, oy, p.D*S+20, 20, 'rgba(94,184,212,0.15)', 5);

  ctx.fillStyle = C.sky;
  ctx.fillRect(ox, oy-rHs-20, dS, rHs+20);

  if (p.sideWalls) {
    ctx.fillStyle = 'rgba(26,64,96,0.6)';
    ctx.beginPath();
    ctx.moveTo(ox, oy); ctx.lineTo(ox, oy-fHs);
    ctx.lineTo(ox+dS, oy-rHs); ctx.lineTo(ox+dS, oy);
    ctx.closePath(); ctx.fill();
    drawHatch(ox, oy-rHs, dS, rHs, 'rgba(94,184,212,0.06)', 12);

    ctx.fillStyle = 'rgba(94,184,212,0.3)';
    ctx.fillRect(ox-6, oy-fHs, 10, fHs);
    ctx.fillRect(ox+dS-6, oy-rHs, 10, rHs);
    ctx.strokeStyle = C.post; ctx.lineWidth = 1;
    ctx.strokeRect(ox-6, oy-fHs, 10, fHs);
    ctx.strokeRect(ox+dS-6, oy-rHs, 10, rHs);
  }

  // Roof
  ctx.beginPath();
  ctx.moveTo(ox-14, oy-fHs);
  ctx.lineTo(ox+dS+14, oy-rHs);
  ctx.lineTo(ox+dS+14, oy-rHs-12);
  ctx.lineTo(ox-14, oy-fHs-12);
  ctx.closePath();
  ctx.fillStyle = C.roofDark; ctx.fill();
  drawHatch(ox-14, oy-rHs-12, dS+28, rHs+12, 'rgba(94,184,212,0.08)', 10);
  ctx.beginPath();
  ctx.moveTo(ox, oy-fHs); ctx.lineTo(ox+dS, oy-rHs);
  ctx.strokeStyle = C.roof; ctx.lineWidth = 2; ctx.stroke();
  ctx.strokeStyle = 'rgba(94,184,212,0.15)'; ctx.lineWidth = 0.8;
  const nRafters = 5;
  for (let i = 0; i <= nRafters; i++) {
    const rx = ox + dS*i/nRafters;
    const ry = oy - fHs - (rHs-fHs)*i/nRafters;
    ctx.beginPath(); ctx.moveTo(rx, oy); ctx.lineTo(rx, ry); ctx.stroke();
  }

  if (p.woodBay) {
    const woodX = ox + dS*0.55;
    const stackW = dS*0.4;
    const stackH = fHs*0.55;
    for (let r = 0; r < 4; r++) {
      ctx.fillStyle = r%2===0 ? C.wood : C.woodDark;
      ctx.fillRect(woodX, oy - stackH + r*(stackH/4), stackW, stackH/4 - 2);
      ctx.strokeStyle = 'rgba(122,96,64,0.4)'; ctx.lineWidth=0.5;
      for (let l = 0; l < 6; l++) {
        ctx.strokeRect(woodX + l*(stackW/6)+1, oy - stackH + r*(stackH/4)+1, stackW/6-2, stackH/4-4);
      }
    }
    labelText('WOOD', woodX+stackW/2, oy-stackH-8, C.cedar, '0.58rem');
  }

  drawDimW(ctx, ox, oy+30, dS, `${p.D} ft`, C.dim);
  drawDimH(ctx, ox-32, oy, fHs, `${p.fH} ft`, C.dim);
  drawDimH(ctx, ox+dS+28, oy, rHs, `${rH.toFixed(1)} ft`, C.dim);

  const midX = ox + dS*0.3;
  const midY = oy - fHs - (rHs-fHs)*0.3;
  ctx.strokeStyle = 'rgba(255,201,71,0.5)'; ctx.lineWidth=0.8; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(midX, midY); ctx.lineTo(midX+30, midY); ctx.lineTo(midX+30, midY - (rHs-fHs)*0.3); ctx.stroke();
  ctx.setLineDash([]);
  labelText(`${p.pitch}/12`, midX+36, midY - (rHs-fHs)*0.15, C.straw, '0.58rem');
  labelText('SIDE VIEW — CROSS-SECTION', cw/2, 14, 'rgba(94,184,212,0.5)', '0.52rem');
}

function drawUTV(ctx, cx, groundY, w, S) {
  const h = w*0.55, bh = h*0.45;
  const x = cx - w/2, y = groundY - bh;
  ctx.strokeStyle = '#2a9a60'; ctx.lineWidth = 1;
  ctx.strokeRect(x, y - h*0.5, w, h*0.5);
  ctx.fillStyle = 'rgba(42,154,96,0.15)';
  ctx.fillRect(x, y - h*0.5, w, h*0.5);
  ctx.strokeRect(x, y - bh, w, bh);
  ctx.fillStyle = 'rgba(42,154,96,0.2)';
  ctx.fillRect(x, y - bh, w, bh);
  ctx.strokeStyle = '#1a1208'; ctx.fillStyle = 'rgba(10,21,37,0.9)';
  [[x+w*0.18, groundY],[x+w*0.82, groundY]].forEach(([wx,wy]) => {
    ctx.beginPath(); ctx.arc(wx, wy-6, 10, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(94,184,212,0.3)'; ctx.lineWidth=1; ctx.stroke();
  });
}

function drawSplitter(ctx, cx, groundY, w, S) {
  const h = w*0.5;
  ctx.strokeStyle = C.splitter; ctx.lineWidth = 0.8;
  ctx.strokeRect(cx-w/2, groundY-h, w, h*0.25);
  ctx.fillStyle = 'rgba(90,138,170,0.2)';
  ctx.fillRect(cx-w/2, groundY-h, w, h*0.25);
  ctx.strokeRect(cx-w*0.1, groundY-h*0.9, w*0.2, h*0.8);
  ctx.fillRect(cx-w*0.1, groundY-h*0.9, w*0.2, h*0.8);
  ctx.fillStyle = 'rgba(224,82,82,0.5)';
  ctx.strokeStyle = '#e05252'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx, groundY-h*1.1);
  ctx.lineTo(cx-w*0.15, groundY-h*0.85);
  ctx.lineTo(cx+w*0.15, groundY-h*0.85);
  ctx.closePath(); ctx.fill(); ctx.stroke();
}

function drawWoodStack(ctx, x, groundY, w, h, S) {
  const stackH = h * 0.65;
  const rows = 4;
  for (let r = 0; r < rows; r++) {
    ctx.fillStyle = r%2===0 ? C.wood : C.woodDark;
    const rh = stackH/rows;
    ctx.fillRect(x + w*0.06, groundY - rh*(r+1), w*0.88, rh - 2);
    const logW = (w*0.88)/7;
    for (let l = 0; l < 7; l++) {
      ctx.strokeStyle = 'rgba(196,160,100,0.3)'; ctx.lineWidth=0.5;
      ctx.beginPath();
      ctx.arc(x+w*0.06+logW*(l+0.5), groundY - rh*(r+0.5), logW*0.4, 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

function drawDimW(ctx, x, y, w, label, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 0.8;
  // Extension lines
  ctx.strokeStyle = color + '60'; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(x, y-24); ctx.lineTo(x, y+5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w, y-24); ctx.lineTo(x+w, y+5); ctx.stroke();
  ctx.setLineDash([]);
  // Dimension line
  ctx.strokeStyle = color; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+w, y); ctx.stroke();
  // 45° ticks
  ctx.beginPath(); ctx.moveTo(x-4, y-4); ctx.lineTo(x+4, y+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w-4, y-4); ctx.lineTo(x+w+4, y+4); ctx.stroke();
  labelText(label, x+w/2, y+13, color, '0.62rem');
}

function drawDimH(ctx, x, y, h, label, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 0.8;
  // Extension lines
  ctx.strokeStyle = color + '60'; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(x-5, y); ctx.lineTo(x+20, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-5, y-h); ctx.lineTo(x+20, y-h); ctx.stroke();
  ctx.setLineDash([]);
  // Dimension line
  ctx.strokeStyle = color; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y-h); ctx.stroke();
  // 45° ticks
  ctx.beginPath(); ctx.moveTo(x-4, y-4); ctx.lineTo(x+4, y+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-4, y-h-4); ctx.lineTo(x+4, y-h+4); ctx.stroke();
  ctx.save();
  ctx.translate(x-14, y-h/2);
  ctx.rotate(-Math.PI/2);
  ctx.font = '600 0.62rem JetBrains Mono, monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function labelText(text, x, y, color, size) {
  ctx.font = `600 ${size} JetBrains Mono, monospace`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y);
}

window.addEventListener('resize', draw);
draw();
</script>
</body>
